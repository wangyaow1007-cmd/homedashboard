<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>家务中控</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red: #FF4D20;
  --black: #F5F5F7;
  --gray: #949499;
  --gray-light: #2C2C2E;
  --gray-mid: #3A3A3C;
  --white: #1C1C1E;
  --done-text: #48484A;
  --bg: #000000;
  --sidebar: #1C1C1E;
  --card-bg: #2C2C2E;
  --border: #3A3A3C;
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--black);
  font-family:'Noto Sans SC', sans-serif;
  font-weight:400;
  -webkit-font-smoothing:antialiased;
}

.layout{
  display:grid;
  grid-template-columns:320px 1fr;
  height:100vh;
  padding-top:env(safe-area-inset-top);
}

/* ── LEFT ── */
.left{
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
}
.left-red-bar{height:4px;background:var(--red);flex-shrink:0;}

.left-top{padding:40px 32px 32px;}
.clock-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:120px;line-height:0.88;
  letter-spacing:2px;color:var(--black);
}
.clock-date{
  font-size:14px;letter-spacing:0.14em;
  font-weight: 500;
  text-transform:uppercase;color:var(--gray);
  margin-top:12px;
}

.left-divider{height:1px;background:var(--border);margin:0 32px;}

.left-mid{padding:32px 32px 24px;flex-shrink:0;}
.section-label{
  font-size:12px;font-weight:600;
  letter-spacing:0.18em;text-transform:uppercase;
  color:var(--gray);margin-bottom:18px;
}
.stat-rows{display:flex;flex-direction:column;gap:16px;}
.stat-row{display:flex;align-items:center;gap:14px;}
.stat-name{font-size:14px;font-weight: 500;color:var(--black);width:40px;flex-shrink:0;}
.bar-track{flex:1;height:4px;background:var(--gray-light);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;background:var(--black);transition:width 0.7s cubic-bezier(.4,0,.2,1);}
.bar-fill.full{background:var(--red);}
.stat-frac{font-size:14px;font-weight: 500;color:var(--gray);min-width:32px;text-align:right;}

.left-divider2{height:1px;background:var(--border);margin:0 32px;}

.left-nums{
  padding:24px 32px;
  display:grid;grid-template-columns:repeat(3,1fr);
}
.num-cell{text-align:center;}
.num-cell+.num-cell{border-left:1px solid var(--border);}
.num-big{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;color:var(--black);}
.num-big.accent{color:var(--red);}
.num-label{font-size:12px;color:var(--gray);letter-spacing:0.06em;margin-top:4px;}

.left-status{
  padding:20px 32px 0;
  font-size:14px;color:var(--gray);line-height:1.6;
}
.left-status strong{color:var(--black);font-weight:600;}

.reset-notice{
  margin:12px 28px 0;
  font-size:11px;color:var(--red);
  border-left:2px solid var(--red);
  padding:6px 10px;
  line-height:1.5;display:none;
}
.reset-notice.show{display:block;}

/* mascot — bottom right of LEFT panel, large */
.mascot-wrap{
  position:absolute;
  bottom:0;right:0;
  width:288px;height:288px;
  display:flex;align-items:flex-end;justify-content:flex-end;
  pointer-events:none;
}
.mascot-img{
  width:288px;height:288px;
  image-rendering:pixelated;
  object-fit:contain;
}

/* ── RIGHT ── */
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

.tabbar{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--border);
  padding:0 48px;
  flex-shrink:0;background:var(--sidebar);
}
.tab-btn{
  padding:0 24px;height:72px;
  font-size:15px;font-weight:600;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--gray);
  background:none;border:none;
  border-bottom:3px solid transparent;
  cursor:pointer;transition:all 0.2s;
  white-space:nowrap;
  font-family:'Noto Sans SC',sans-serif;
}
.tab-btn.active{color:var(--black);border-bottom-color:var(--red);}
.tab-btn:hover:not(.active){color:var(--black);background:rgba(255,255,255,0.03);}
.tabbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hdr-btn{
  font-size:14px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--gray);background:none;
  border:1px solid var(--border);
  padding:10px 20px;border-radius:6px;
  cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
  font-family:'Noto Sans SC',sans-serif;
}
.hdr-btn:hover{color:var(--black);border-color:var(--black);background:rgba(255,255,255,0.05);}
.hdr-btn.accent{color:var(--white);border-color:var(--red);background:var(--red);box-shadow: 0 4px 12px rgba(255, 77, 32, 0.2);}
.hdr-btn.accent:hover{background:var(--red);opacity: 0.9;}

/* scroll */
.task-scroll{flex:1;overflow-y:auto;padding:48px 48px 64px;}
.task-scroll::-webkit-scrollbar{width:4px;}
.task-scroll::-webkit-scrollbar-thumb{background:var(--gray-mid);border-radius:2px;}

.tab-content{display:none;}
.tab-content.active{display:block;}

/* section — generous spacing, minimal lines */
.section{margin-bottom:64px;}

.sec-header{
  display:flex;align-items:baseline;gap:0;
  margin-bottom:28px;
  border-left:4px solid var(--red);
  padding-left:16px;
}
.sec-name{
  font-size:14px;font-weight:700;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--gray);
  flex:1;
}
.sec-add{
  font-size:13px;font-weight:600;letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--gray);background:none;border:none;
  cursor:pointer;padding:0;
  transition:color 0.15s;
  font-family:'Noto Sans SC',sans-serif;
}
.sec-add:hover{color:var(--red);}

/* task rows — only bottom border on last, spacious */
.task-list{display:flex;flex-direction:column;gap:0;}

.task-card{
  display:flex;align-items:center;gap:20px;
  padding:20px 16px;
  border-radius:12px;
  margin-bottom:12px;
  background:var(--card-bg);
  border:1px solid transparent;
  cursor:pointer;
  transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position:relative;
}
.task-card:hover{
  border-color:var(--gray-mid);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.t-check{
  width:28px;height:28px;
  border:2px solid var(--gray);
  border-radius:8px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.task-card.done .t-check{background:var(--red);border-color:var(--red);}
.t-tick{
  width:14px;height:8px;
  border-left:3px solid var(--white);
  border-bottom:3px solid var(--white);
  transform:rotate(-45deg) translateY(-1px);
  opacity:0;transition:opacity 0.12s;
}
.task-card.done .t-tick{opacity:1;}

.t-name{
  font-size:20px;font-weight:500;
  color:var(--black);flex:1;line-height:1.4;
}
.task-card.done .t-name{
  color:var(--done-text);
  text-decoration:line-through;
}

.t-tags{display:flex;gap:8px;flex-shrink:0;}
.tag{
  font-size:12px;font-weight:600;
  letter-spacing:0.05em;text-transform:uppercase;
  padding:4px 10px;
  border-radius:4px;
}
.tag-warn{background:var(--red);color:var(--white);}
.tag-bi{border:1px solid var(--gray-mid);color:var(--gray);}
.tag-plant{border:1px solid var(--gray-mid);color:var(--gray);}

.t-date{font-size:14px;color:var(--gray);flex-shrink:0;}

.t-del{
  width:32px;height:32px;background:none;border:none;
  color:var(--gray);font-size:22px;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  line-height:1;flex-shrink:0;transition:color 0.15s;
}
.task-card:hover .t-del{display:flex;}
.t-del:hover{color:var(--red);}

/* inline add */
.inline-add-row{
  display:flex;align-items:center;gap:12px;
  padding:20px 0;
}
.inline-input{
  flex:1;border:none;border-bottom:2px solid var(--red);
  padding:12px 0;font-size:18px;font-weight: 500;
  font-family:'Noto Sans SC',sans-serif;
  color:var(--black);outline:none;background:none;
}
.inline-input::placeholder{color:var(--gray-mid);}
.inline-ok{
  padding:10px 24px;font-size:14px;font-weight:600;
  letter-spacing:0.12em;text-transform:uppercase;
  background:var(--red);color:var(--white);
  border:none;border-radius:6px;cursor:pointer;
  font-family:'Noto Sans SC',sans-serif;
  transition:opacity 0.15s;
}
.inline-ok:hover{opacity: 0.9;}
.inline-cancel{
  padding:10px 16px;font-size:14px;font-weight:600;
  letter-spacing:0.12em;text-transform:uppercase;
  background:none;color:var(--gray);
  border:1px solid var(--gray-mid);border-radius:6px;cursor:pointer;
  font-family:'Noto Sans SC',sans-serif;
  transition:all 0.15s;
}
.inline-cancel:hover{border-color:var(--black);color:var(--black);}

/* ── History redesign ── */
.hist-stats{
  display:flex;gap:0;margin-bottom:32px;
  background:var(--card-bg);border-radius:16px;
  overflow:hidden;border:1px solid var(--border);
}
.hist-stat{flex:1;padding:22px 16px;text-align:center;}
.hist-stat+.hist-stat{border-left:1px solid var(--border);}
.hist-stat-num{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:1;color:var(--black);}
.hist-stat-lbl{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gray);margin-top:6px;}

.hist-activity{margin-bottom:40px;}
.hist-act-label{font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--gray);margin-bottom:14px;}
.hist-bars{display:flex;gap:6px;align-items:flex-end;height:52px;}
.hist-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.hist-bar{width:100%;border-radius:3px 3px 0 0;background:var(--gray-mid);min-height:2px;}
.hist-bar.has-data{background:var(--gray);}
.hist-bar.today{background:var(--red);}
.hist-bar-day{font-size:10px;color:var(--gray);letter-spacing:0.04em;}

.hist-day-card{
  background:var(--card-bg);border-radius:16px;
  padding:20px 22px;margin-bottom:14px;
  border:1px solid var(--border);
}
.hist-day-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.hist-day-date{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:var(--black);}
.hist-day-count{
  font-size:11px;font-weight:600;letter-spacing:0.08em;
  color:var(--gray);background:var(--gray-light);
  padding:3px 9px;border-radius:20px;
}
.hist-day-archive{font-size:11px;color:var(--gray);letter-spacing:0.04em;margin-left:auto;opacity:0.6;}
.hist-chips{display:flex;flex-wrap:wrap;gap:8px;}
.hist-chip{
  display:inline-flex;align-items:center;
  font-size:13px;font-weight:500;color:var(--black);
  background:var(--gray-light);padding:7px 12px;
  border-radius:8px;border-left:3px solid var(--gray-mid);
  line-height:1.3;
}
.hist-chip.daily{border-left-color:var(--red);}
.hist-chip.weekly{border-left-color:#5E7CE0;}
.hist-chip.monthly{border-left-color:#2EBFA5;}

.empty-hist{font-size:18px;color:var(--gray);text-align:center;padding:80px 0;line-height:2.4;letter-spacing:0.06em;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter: blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--white);
  padding:48px;width:480px;border-radius:24px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  transform:scale(0.9) translateY(20px);transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.modal-bg.show .modal{transform:scale(1) translateY(0);}
.modal-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:48px;letter-spacing:2px;
  margin-bottom:32px;color:var(--black);
}
.modal label{
  display:block;font-size:13px;font-weight:600;
  letter-spacing:0.16em;text-transform:uppercase;
  color:var(--gray);margin-bottom:10px;
}
.modal input,.modal select{
  width:100%;border:none;
  border-bottom:2px solid var(--border);
  padding:12px 0;font-size:18px;font-weight:500;
  font-family:'Noto Sans SC',sans-serif;
  color:var(--black);outline:none;
  margin-bottom:28px;background:none;
}
.modal input:focus,.modal select:focus{border-bottom-color:var(--red);}
.modal select option{background:var(--white);color:var(--black);}
.modal-row{display:flex;gap:16px;margin-top:16px;}
.m-cancel{
  flex:1;padding:16px;background:none;
  border:1px solid var(--border);
  color:var(--gray);font-size:14px;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  border-radius:12px;
  cursor:pointer;font-family:'Noto Sans SC',sans-serif;
  transition:all 0.15s;
}
.m-cancel:hover{border-color:var(--black);color:var(--black);background:rgba(255,255,255,0.05);}
.m-ok{
  flex:1;padding:16px;background:var(--red);border:none;
  color:var(--white);font-size:14px;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  border-radius:12px;
  cursor:pointer;font-family:'Noto Sans SC',sans-serif;
  transition:all 0.15s;
  box-shadow: 0 8px 24px rgba(255, 77, 32, 0.2);
}
.m-ok:hover{opacity:0.9;transform:translateY(-1px);}

/* ── FLIP CLOCK SCREENSAVER ── */
#screensaver{
  position:fixed;inset:0;z-index:9999;
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  opacity:0;pointer-events:none;
  transition:opacity 0.6s ease;
}
#screensaver::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(5,15,50,0.65) 100%);
  pointer-events:none;
}
#screensaver.visible{opacity:1;pointer-events:all;}

/* Clock row */
.fc-wrap{
  display:flex;align-items:center;gap:min(3vw,36px);
  position:relative;z-index:1;
}
/* Board: shared card wrapping two digits */
.fc-board{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 12px 48px rgba(0,0,0,0.7);
}
.fc-board::after{
  content:'';position:absolute;left:0;right:0;top:50%;
  margin-top:-1px;height:2px;
  background:#000;z-index:25;pointer-events:none;
}
.fc-am-pm{
  position:absolute;top:9px;left:13px;z-index:30;
  font-family:'Bebas Neue',sans-serif;
  font-size:min(1.6vw,20px);letter-spacing:0.18em;
  color:#3a3a3a;line-height:1;
}
.fc-board-inner{display:flex;gap:0;}
/* Legacy group — kept for compat */
.fc-group{display:flex;gap:0;}

/* Colon dots */
.fc-colon{
  display:flex;flex-direction:column;justify-content:center;gap:1.2vw;
  padding-bottom:2.5vw;
}
.fc-dot{
  width:0.7vw;height:0.7vw;min-width:5px;min-height:5px;
  background:#2a2a2a;border-radius:50%;
}

/* Digit card — use min() so --ch always equals the actual rendered height,
   preventing fc-inner mismatch when a separate max-height would override */
.fc-digit{
  --ch:min(30vw,380px);
  --cw:min(20vw,252px);
  --fs:var(--ch);
  position:relative;
  width:var(--cw);height:var(--ch);
  perspective:1200px;
}
.fc-digit.sm{
  --ch:min(11vw,152px);
  --cw:min(8.5vw,118px);
  --fs:var(--ch);
  perspective:500px;
}

/* Top / bottom halves — each is a clipping window */
.fc-half{width:100%;height:50%;overflow:hidden;position:relative;}
.fc-half.top{
  background:linear-gradient(180deg,#1e1e1e 0%,#191919 100%);
}
.fc-half.bot{
  background:linear-gradient(180deg,#161616 0%,#121212 100%);
}

/*
  fc-inner: spans FULL card height (= 2× half height), anchored at the dividing line.
  Both halves render the digit at EXACTLY the same absolute position in card space,
  so the cut is always pixel-perfectly continuous regardless of font metrics.

  Top half:  inner.top = 0  → inner goes 0→ch, clip shows 0→ch/2 = upper half ✓
  Bot half:  inner.bottom = 0 → inner bottom = ch/2 (container), top = ch/2−ch = −ch/2
             → clip shows 0→ch/2 of container = ch/2→ch of the digit = lower half ✓
*/
.fc-inner{
  position:absolute;left:0;right:0;
  height:var(--ch);
}
.fc-half.top .fc-inner{top:0;}
.fc-half.bot .fc-inner{bottom:0;}

/* Number — fills fc-inner exactly */
.fc-n{
  font-family:'Bebas Neue',sans-serif;
  font-size:var(--fs);
  line-height:var(--ch);
  width:100%;text-align:center;
  color:#c4c4c4;
  display:block;
  user-select:none;
}

/* Single-face flap — same geometry as top half */
.fc-flap{
  position:absolute;top:0;left:0;right:0;
  height:50%;overflow:hidden;
  transform-origin:bottom center;
  z-index:10;
  background:linear-gradient(180deg,#1e1e1e 0%,#191919 100%);
}
/* Flap's inner: same as top half (top:0) so digit aligns with static top */
.fc-flap .fc-inner{top:0;position:absolute;left:0;right:0;height:var(--ch);}

@keyframes fcFold{
  0%  {transform:rotateX(0deg);}
  100%{transform:rotateX(-90deg);}
}
.fc-digit.flipping .fc-flap{
  animation:fcFold 0.22s ease-in forwards;
}

/* Label below card */
.fc-lbl{
  text-align:center;
  font-size:10px;font-weight:600;letter-spacing:0.3em;
  text-transform:uppercase;color:#2a2a2a;
  margin-top:12px;
}

/* Date + hint */
.ss-date{
  margin-top:56px;
  font-size:15px;font-weight:400;letter-spacing:0.32em;
  text-transform:uppercase;color:#333;
  position:relative;z-index:1;
}
.ss-hint{
  position:absolute;bottom:32px;
  font-size:10px;letter-spacing:0.22em;color:#1c1c1c;
  text-transform:uppercase;
  animation:pulse-hint 4s ease-in-out infinite;
  z-index:1;
}
@keyframes pulse-hint{0%,100%{opacity:0.3;}50%{opacity:0.85;}}

/* ═══════════════════════════════════════════
   iPad / Touch Adaptation
═══════════════════════════════════════════ */
*{-webkit-tap-highlight-color:transparent;}
button,.task-card,.tab-btn,.hdr-btn,.sec-add,.inline-ok,.inline-cancel,.m-ok,.m-cancel{touch-action:manipulation;}

/* Glass sidebar */
.left{
  background:rgba(28,28,30,0.94)!important;
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
}

/* Safe area insets (iPad home indicator) */
.task-scroll{padding-bottom:calc(64px + env(safe-area-inset-bottom));}

/* Touch: no hover states, always-visible delete, tap feedback */
@media(hover:none){
  .t-del{display:flex!important;opacity:0.28;}
  .task-card:active .t-del{opacity:1;}
  .task-card:hover{transform:none!important;box-shadow:none!important;border-color:transparent!important;}
  .task-card:active{border-color:var(--gray-mid)!important;transform:scale(0.993)!important;}
  .hdr-btn:hover,.sec-add:hover,.m-cancel:hover,.m-ok:hover{transform:none;opacity:1;}
}

/* Portrait iPad (≤900px) */
@media(max-width:900px){
  .layout{grid-template-columns:256px 1fr;}
  .clock-num{font-size:84px;}
  .left-top{padding:26px 20px 18px;}
  .left-mid{padding:18px 20px 16px;}
  .left-nums{padding:16px 20px;}
  .left-status{padding:14px 20px 0;}
  .left-divider,.left-divider2{margin:0 20px;}
  .mascot-wrap,.mascot-img{width:200px;height:200px;}
  .task-scroll{padding:28px 24px 48px;}
  .tabbar{padding:0 16px;}
  .tab-btn{padding:0 12px;height:58px;font-size:13px;letter-spacing:0.08em;}
  .hdr-btn{padding:8px 12px;font-size:12px;}
  .t-name{font-size:17px;}
  .task-card{padding:16px 12px;}
  .t-check{width:34px;height:34px;} /* bigger tap target */
}
/* Narrow portrait (≤680px) */
@media(max-width:680px){
  .layout{grid-template-columns:210px 1fr;}
  .clock-num{font-size:62px;}

/* ── DEAD CODE kept for compat — remove old classes ── */
.flip-static{
  position:absolute;inset:0;
  border-radius:6px;
  overflow:hidden;
}

/* Top half static — shows current number upper half */
.flip-static-top{
  position:absolute;left:0;top:0;width:100%;height:50%;
  background: linear-gradient(180deg, #1a1a1a 0%, #141414 100%);
  border-radius:6px 6px 0 0;
  overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;
}

/* Bottom half static — shows NEXT number lower half */
.flip-static-bot{
  position:absolute;left:0;top:50%;width:100%;height:50%;
  background: linear-gradient(180deg, #0e0e0e 0%, #0a0a0a 100%);
  border-radius:0 0 6px 6px;
  overflow:hidden;
  display:flex;align-items:flex-start;justify-content:center;
}

/* Dividing line between top & bottom */
.flip-divide{
  position:absolute;left:0;top:50%;width:100%;height:2px;
  background:#000;
  z-index:10;
  box-shadow: 0 1px 4px rgba(0,0,0,0.8);
}

/* Number style */
.flip-num{
  font-family:'Bebas Neue', 'Arial Black', sans-serif;
  font-size:21vw;
  line-height:1;
  user-select:none;
  letter-spacing:-1px;
  /* Subtle gradient from lighter gray to slightly darker */
  background: linear-gradient(180deg, #c0c0c0 0%, #a8a8a8 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
/* Clamp font to match max card size */
@media (min-width:1215px){
  .flip-num{ font-size:255px; }
}

/* Top half num: show only upper portion */
.flip-static-top .flip-num{
  transform:translateY(50%);
  /* Top half gets slightly lighter gradient */
  background: linear-gradient(180deg, #cccccc 0%, #b4b4b4 50%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* Bottom half num: show only lower portion */
.flip-static-bot .flip-num{
  transform:translateY(-50%);
  background: linear-gradient(180deg, #aaaaaa 0%, #989898 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ── Flip animation layer ── */
.flip-flap{
  position:absolute;left:0;top:0;width:100%;height:50%;
  transform-origin:bottom center;
  transform-style:preserve-3d;
  z-index:20;
  border-radius:6px 6px 0 0;
}

.flap-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;
  border-radius:6px 6px 0 0;
}
.flap-face.back{
  transform:rotateX(180deg);
  align-items:flex-end;
}

/* Front of flap = old number top half */
.flap-face.front{
  background: linear-gradient(180deg, #1a1a1a 0%, #141414 100%);
}
/* Back of flap = new number top half (revealed as it flips) */
.flap-face.back{
  background: linear-gradient(180deg, #1a1a1a 0%, #141414 100%);
}

.flap-face .flip-num{
  transform:translateY(50%);
}

/* Shadow overlay on flap during animation */
.flip-flap::after{
  content:'';
  position:absolute;inset:0;
  background:transparent;
  border-radius:6px 6px 0 0;
  transition:background 0.45s;
  z-index:5;
  pointer-events:none;
}

/* The flip animation */
.flip-unit.flipping .flip-flap{
  animation: doFlip 0.5s cubic-bezier(0.37, 0, 0.63, 1) forwards;
}
@keyframes doFlip{
  0%  { transform: rotateX(0deg); }
  100%{ transform: rotateX(-180deg); }
}

/* Shadow that darkens during flip */
.flip-unit.flipping .flip-flap::after{
  background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.35) 100%);
}

/* ── Ambient glow behind each card ── */
.flip-unit::before{
  content:'';
  position:absolute;inset:-20px;
  border-radius:20px;
  background: radial-gradient(ellipse at center, rgba(30,60,120,0.08) 0%, transparent 70%);
  z-index:-1;
  pointer-events:none;
}

/* ── Label below card ── */
.flip-label{
  margin-top:20px;
  font-size:11px;font-weight:600;
  letter-spacing:0.35em;text-transform:uppercase;
  color:#2a2a2a;
}

/* ── Date below clock ── */
.ss-date{
  margin-top:56px;
  font-size:15px;font-weight:400;letter-spacing:0.3em;
  text-transform:uppercase;color:#252525;

/* ── Hint at bottom ── */
.ss-hint{

  font-size:11px;letter-spacing:0.2em;color:#1c1c1c;
  text-transform:uppercase;
  animation:pulse-hint 4s ease-in-out infinite;
}
@keyframes pulse-hint{
  0%,100%{opacity:0.3;}
  50%{opacity:0.8;}
}

  if(!streaks) streaks={};

  try{
    localStorage.setItem('hd_data',    JSON.stringify(appData));
    localStorage.setItem('hd_state',   JSON.stringify(state));
    localStorage.setItem('hd_history', JSON.stringify(hist));

let streaks={};
let focusMode=false;
let lastPcts={d:{d:0,t:0,pct:0},w:{d:0,t:0,pct:0},m:{d:0,t:0,pct:0}};

const DAYS=['日','一','二','三','四','五','六'];
const TNAMES={daily:'每天',weekly:'每周',monthly:'每月/季度'};

/* ── Streak: track consecutive completions ── */
function updateStreak(id){
  const todayKey=dayKey(new Date());
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yKey=dayKey(yesterday);
  if(!streaks[id]){streaks[id]={count:1,last:todayKey};}
  else if(streaks[id].last===yKey){streaks[id].count++;streaks[id].last=todayKey;}
  else if(streaks[id].last!==todayKey){streaks[id]={count:1,last:todayKey};}
}

/* ── Focus mode ── */
function toggleFocusMode(){
  focusMode=!focusMode;
  document.body.classList.toggle('focus-mode',focusMode);
  const btn=document.getElementById('focus-btn');
  if(btn)btn.classList.toggle('on',focusMode);
}

/* ── Section select-all / deselect-all ── */
function selectAll(tabId,secLabel){
  const s=appData[tabId].sections.find(s=>s.label===secLabel);
  if(!s)return;
  const allDone=s.tasks.every(t=>!!state[t.id]);
  const ds=fmtDate(new Date());
  s.tasks.forEach(t=>{
    if(allDone){state[t.id]=null;}
    else if(!state[t.id]){
      state[t.id]=ds;
      updateStreak(t.id);
      hist.unshift({date:ds,name:t.name,tab:tabId,ts:Date.now()});
    }
  });
  if(hist.length>500)hist.length=500;
  if(!allDone)triggerHappy();
  save();render();
}

/* ── Screensaver progress ── */
function updateSSProgress(){
  ['d','w','m'].forEach(k=>{
    const el=document.getElementById('ss-prog-'+k);
    if(!el)return;
    const p=lastPcts[k];
    if(!p||!p.t){el.textContent='—';el.className='ss-prog-num';return;}
    el.textContent=p.pct+'%';
    el.className='ss-prog-num'+(p.pct===100?' done':p.pct>0?' lit':'');
  });
}
function fmtDate(d){return(d.getMonth()+1)+'月'+d.getDate()+'日';}
function dayKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function weekKey(d){const dy=d.getDay()||7;const m=new Date(d);m.setDate(d.getDate()-dy+1);return m.getFullYear()+'-'+(m.getMonth()+1)+'-'+m.getDate();}
function monthKey(d){return d.getFullYear()+'-'+(d.getMonth()+1);}

  requestAnimationFrame(()=>{ el.src=GIFS[s]; });
}
function triggerHappy(){
  if(happyTimer)clearTimeout(happyTimer);
  setMascot('happy');
  happyTimer=setTimeout(()=>{happyTimer=null;restoreMascot();},2200);
}
function triggerCarrying(){
  if(happyTimer)clearTimeout(happyTimer);
  setMascot('carrying');
  happyTimer=setTimeout(()=>{happyTimer=null;restoreMascot();},2200);
}
function triggerBuilding(){
  if(happyTimer)clearTimeout(happyTimer);
  setMascot('building');
  happyTimer=setTimeout(()=>{happyTimer=null;restoreMascot();},2200);
}
function restoreMascot(){
  if(happyTimer)return;
  // Always default to idle in permanent dark mode unless special logic is added later
  sweepActive=false;
  setMascot('idle');
}
function scheduleSweepCheck(){
  if(happyTimer)return;
  // Occasionally trigger sweep animation regardless of time
  if(!sweepActive && Math.random()<0.1){
    sweepActive=true;
    setMascot('sweep');
    setTimeout(() => { sweepActive=false; restoreMascot(); }, 10000);
  }
}

// auto-reset
let resetMsgs=[];
function archiveReset(tabId,label){
  const ds=fmtDate(new Date());
  appData[tabId].sections.forEach(s=>s.tasks.forEach(t=>{
    if(state[t.id]){hist.unshift({date:state[t.id],name:t.name,tab:tabId,archivedAt:ds,ts:Date.now()});state[t.id]=null;}
  }));
  if(hist.length>500)hist.length=500;
  resetMsgs.push(label+'已自动归档');
}
function checkReset(){
  const now=new Date();resetMsgs=[];
  const dk=dayKey(now),wk=weekKey(now),mk=monthKey(now);
  if(lastKeys.daily   &&lastKeys.daily!==dk)  archiveReset('daily','每天');
  if(lastKeys.weekly  &&lastKeys.weekly!==wk) archiveReset('weekly','每周');
  if(lastKeys.monthly &&lastKeys.monthly!==mk)archiveReset('monthly','每月');
  lastKeys.daily=dk;lastKeys.weekly=wk;lastKeys.monthly=mk;
  save();
  if(resetMsgs.length){
    const n=document.getElementById('reset-notice');
    n.textContent=resetMsgs.join('；');
    n.classList.add('show');
    setTimeout(()=>n.classList.remove('show'),7000);
  }
}

function updateClock(){
  const now=new Date();
  const hrs=now.getHours();
  document.getElementById('clock').textContent=
    String(hrs).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  document.getElementById('dateline').textContent=
    now.getFullYear()+' / '+(now.getMonth()+1)+'.'+String(now.getDate()).padStart(2,'0')+'  周'+DAYS[now.getDay()];
}

function updateLeft(){
  const pcts={};
  ['daily','weekly','monthly'].forEach((id,i)=>{
    const k=['d','w','m'][i];
    let t=0,d=0;
    appData[id].sections.forEach(s=>s.tasks.forEach(tk=>{t++;if(state[tk.id])d++;}));
    const pct=t?Math.round(d/t*100):0;
    const b=document.getElementById('bar-'+k);
    b.style.width=pct+'%';
    b.classList.toggle('full',pct===100);
    document.getElementById('frac-'+k).textContent=d+'/'+t;
    pcts[k]={d,t,pct};
  });
  lastPcts=pcts;
  document.getElementById('sum-d-pct').textContent=pcts.d.t?pcts.d.pct+'%':'—';
  document.getElementById('sum-w-pct').textContent=pcts.w.t?pcts.w.pct+'%':'—';
  document.getElementById('sum-m-pct').textContent=pcts.m.t?pcts.m.pct+'%':'—';
  const rem=pcts.d.t-pcts.d.d;
  const st=document.getElementById('left-status');
  st.innerHTML=pcts.d.t===0?'加载中…'
    :rem===0?'<strong>今日任务全部完成</strong>，辛苦了。'
    :'今日还有 <strong>'+rem+'</strong> 项待完成';
  updateSSProgress();
}

function toggle(id,tabId){
  let completing=false;
  if(state[id]){state[id]=null;}
  else{
    completing=true;
    const ds=fmtDate(new Date());state[id]=ds;
    updateStreak(id);
    let name='';appData[tabId].sections.forEach(s=>s.tasks.forEach(t=>{if(t.id===id)name=t.name;}));
    hist.unshift({date:ds,name,tab:tabId,ts:Date.now()});
    if(hist.length>500)hist.length=500;
    triggerHappy();
  }
  save();render();
  if(completing){
    setTimeout(()=>{
      const el=document.querySelector(`.task-card[data-id="${id}"]`);
      if(el){el.classList.add('completing');el.addEventListener('animationend',()=>el.classList.remove('completing'),{once:true});}
    },10);
  }
}
function delTask(tabId,secLabel,id,e){
  e.stopPropagation();
  const s=appData[tabId].sections.find(s=>s.label===secLabel);
  if(s)s.tasks=s.tasks.filter(t=>t.id!==id);
  delete state[id];save();render();
}

let openAddSec=null;
function showInlineAdd(tabId,secLabel){
  triggerBuilding();
  openAddSec={tabId,secLabel};render();
  setTimeout(()=>{const i=document.getElementById('inline-inp');if(i)i.focus();},60);
}
function inlineConfirm(){
  const inp=document.getElementById('inline-inp');if(!inp)return;
  const name=inp.value.trim();
  if(!name){openAddSec=null;render();return;}
  const {tabId,secLabel}=openAddSec;
  const s=appData[tabId].sections.find(s=>s.label===secLabel);
  if(s)s.tasks.push({id:'c'+Date.now(),name});
  openAddSec=null;save();render();
}
function inlineCancel(){openAddSec=null;render();}

let currentTab='daily';
function renderTaskTab(tabId){
  const container=document.getElementById('tab-'+tabId);
  const tab=appData[tabId];
  let html='';
  tab.sections.forEach(sec=>{
    const isOpen=openAddSec&&openAddSec.tabId===tabId&&openAddSec.secLabel===sec.label;
    if(!sec.tasks.length&&!isOpen)return;
    const allDone=sec.tasks.length>0&&sec.tasks.every(t=>!!state[t.id]);
    const secLabel=sec.label.replace(/'/g,"\\'");
    html+=`<div class="section${allDone?' all-done':''}">
      <div class="sec-header">
        <span class="sec-name">${sec.label}</span>
        <button class="sec-all${allDone?' undo':''}" onclick="selectAll('${tabId}','${secLabel}')">${allDone?'↩ 撤销':'全选'}</button>
        <button class="sec-add" onclick="showInlineAdd('${tabId}','${secLabel}')">+ 添加</button>
      </div>
      <div class="task-list">`;
    sec.tasks.forEach(task=>{
      const done=!!state[task.id];
      let tags='';
      if(task.warn) tags+=`<span class="tag tag-warn">重点</span>`;
      if(task.bi)   tags+=`<span class="tag tag-bi">隔周</span>`;
      if(task.plant)tags+=`<span class="tag tag-plant">植物</span>`;
      const dateStr=done?`<span class="t-date">${state[task.id]}</span>`:'';
      // Streak badge (only daily tasks ≥2)
      let streakHtml='';
      if(tabId==='daily'&&streaks[task.id]&&streaks[task.id].count>=2){
        const cnt=streaks[task.id].count;
        const hot=cnt>=7;
        streakHtml=`<span class="streak-badge${hot?' hot':''}">${hot?'🔥':'✦'} ${cnt}天</span>`;
      }
      html+=`<div class="task-card ${done?'done':''}" data-id="${task.id}" onclick="toggle('${task.id}','${tabId}')">
        <div class="t-check"><div class="t-tick"></div></div>
        <span class="t-name">${task.name}</span>
        <div class="t-tags">${tags}</div>
        ${streakHtml}
        ${dateStr}
        <button class="t-del" onclick="delTask('${tabId}','${secLabel}','${task.id}',event)">×</button>
      </div>`;
    });
    html+='</div>';
    if(isOpen){
      html+=`<div class="inline-add-row">
        <input class="inline-input" id="inline-inp" placeholder="任务名称，回车确认"
          onkeydown="if(event.key==='Enter')inlineConfirm();if(event.key==='Escape')inlineCancel();">
        <button class="inline-ok" onclick="inlineConfirm()">确认</button>
        <button class="inline-cancel" onclick="inlineCancel()">取消</button>
      </div>`;
    }
    html+='</div>';
  });
  container.innerHTML=html;
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!hist.length){el.innerHTML=`<div class="empty-hist">还没有完成记录<br>打勾任务后会在这里显示</div>`;return;}

  // ── Stats ──
  const now=new Date();
  const curWeek=weekKey(now), curMonth=monthKey(now);
  let weekCount=0,monthCount=0;
  hist.forEach(h=>{
    if(!h.ts)return;
    const d=new Date(h.ts);
    if(weekKey(d)===curWeek)weekCount++;
    if(monthKey(d)===curMonth)monthCount++;
  });

  // ── 7-day activity bars ──
  const dayCounts={};
  const dayMeta=[];
  const todayK=dayKey(now);
  for(let i=6;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const k=dayKey(d);
    dayCounts[k]=0;
    dayMeta.push({k,label:'周'+DAYS[d.getDay()],isToday:k===todayK});
  }
  hist.forEach(h=>{
    if(h.ts){const k=dayKey(new Date(h.ts));if(k in dayCounts)dayCounts[k]++;}
  });
  const maxCnt=Math.max(1,...Object.values(dayCounts));
  const barsHtml=dayMeta.map(({k,label,isToday})=>{
    const cnt=dayCounts[k]||0;
    const barH=cnt>0?Math.max(6,Math.round(cnt/maxCnt*44)):2;
    const cls=isToday?'today':cnt>0?'has-data':'';
    return `<div class="hist-bar-col"><div class="hist-bar ${cls}" style="height:${barH}px"></div><div class="hist-bar-day">${label}</div></div>`;
  }).join('');

  // ── Day cards ──
  const groups={};
  hist.slice(0,500).forEach(h=>{
    const k=h.archivedAt?h.archivedAt+'__archive':h.date;
    if(!groups[k])groups[k]=[];groups[k].push(h);
  });
  let cardsHtml='';
  Object.keys(groups).forEach(k=>{
    const items=groups[k];
    const isArchive=k.endsWith('__archive');
    const dateLabel=isArchive?k.replace('__archive',''):k;
    cardsHtml+=`<div class="hist-day-card">
      <div class="hist-day-hd">
        <span class="hist-day-date">${dateLabel}</span>
        <span class="hist-day-count">${items.length} 项</span>
        ${isArchive?'<span class="hist-day-archive">自动归档</span>':''}
      </div>
      <div class="hist-chips">
        ${items.map(h=>`<span class="hist-chip ${h.tab||''}">${h.name}</span>`).join('')}
      </div>
    </div>`;
  });

  el.innerHTML=`
    <div class="hist-stats">
      <div class="hist-stat"><div class="hist-stat-num">${weekCount}</div><div class="hist-stat-lbl">本周</div></div>
      <div class="hist-stat"><div class="hist-stat-num">${monthCount}</div><div class="hist-stat-lbl">本月</div></div>
      <div class="hist-stat"><div class="hist-stat-num">${hist.length}</div><div class="hist-stat-lbl">累计</div></div>
    </div>
    <div class="hist-activity">
      <div class="hist-act-label">近 7 天</div>
      <div class="hist-bars">${barsHtml}</div>
    </div>
    ${cardsHtml}`;
}

function render(){
  if(currentTab==='history')renderHistory();
  else renderTaskTab(currentTab);
  updateLeft();
}

function switchTab(tabId){
  triggerCarrying();
  openAddSec=null;currentTab=tabId;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['daily','weekly','monthly','history'][i]===tabId);
  });
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tabId).classList.add('active');
  const show=tabId!=='history';
  document.getElementById('reset-btn').style.display=show?'':'none';
  document.getElementById('add-btn').style.display=show?'':'none';
  render();
}

function resetCurrent(){
  if(currentTab==='history')return;
  archiveReset(currentTab,TNAMES[currentTab]);save();render();
}

function openGlobalModal(){
  triggerBuilding();
  document.getElementById('g-name').value='';
  document.getElementById('g-sec').value='';
  document.getElementById('g-tag').value='';
  document.getElementById('g-tab').value=currentTab==='history'?'weekly':currentTab;
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('g-name').focus(),80);
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function globalAdd(){
  const name=document.getElementById('g-name').value.trim();if(!name)return;
  const tabId=document.getElementById('g-tab').value;
  const secLabel=document.getElementById('g-sec').value.trim()||'自定义';
  const tag=document.getElementById('g-tag').value;
  const task={id:'c'+Date.now(),name};
  if(tag==='warn')task.warn=true;
  if(tag==='bi')  task.bi=true;
  if(tag==='plant')task.plant=true;
  let sec=appData[tabId].sections.find(s=>s.label===secLabel);
  if(!sec){sec={label:secLabel,tasks:[]};appData[tabId].sections.push(sec);}
  sec.tasks.push(task);save();closeModal();
  if(currentTab!==tabId)switchTab(tabId);else render();
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('g-name').addEventListener('keydown',e=>{if(e.key==='Enter')globalAdd();if(e.key==='Escape')closeModal();});

// preload all gifs then boot
function preloadGifs(callback){
  let loaded=0;
  const total=Object.keys(GIFS).length;
  Object.values(GIFS).forEach(src=>{
    const img=new Image();
    img.onload=img.onerror=()=>{loaded++;if(loaded>=total)callback();};
    img.src=src;
  });
  // fallback: boot anyway after 3s even if gifs fail
  setTimeout(callback,3000);
}

// ── FLIP CLOCK SCREENSAVER ──
const IDLE_MS = 2 * 60 * 1000;
let idleTimer = null;
let ssVisible = false;
let ssIntervalId = null;
const WEEK_CN = ['日','一','二','三','四','五','六'];
const fcCur = {h1:'',h2:'',m1:'',m2:'',s1:'',s2:''};

function fcSetAll(id, ch){
  ['top','bot','fl'].forEach(p=>{
    const el = document.getElementById('fd-'+id+'-'+p);
    if(el) el.textContent = ch;
  });
  fcCur[id] = ch;
}

function fcFlipDigit(id, newCh){
  if(fcCur[id] === newCh) return;
  const oldCh = fcCur[id];
  fcCur[id] = newCh;

  // Flap shows old digit and folds away
  const fl = document.getElementById('fd-'+id+'-fl');
  if(fl) fl.textContent = oldCh;

  // Immediately update static top to new digit (hidden under flap, revealed as flap folds)
  const topEl = document.getElementById('fd-'+id+'-top');
  if(topEl) topEl.textContent = newCh;

  // Trigger fold animation
  const unit = document.getElementById('fd-'+id);
  if(!unit) return;
  unit.classList.remove('flipping');
  void unit.offsetWidth;
  unit.classList.add('flipping');

  // After fold: update bottom half and reset flap
  setTimeout(()=>{
    unit.classList.remove('flipping');
    const botEl = document.getElementById('fd-'+id+'-bot');
    if(botEl) botEl.textContent = newCh;
    if(fl) fl.textContent = newCh;
  }, 230);
}

function tickSS(){
  const now = new Date();
  const ampmEl=document.getElementById('fc-ampm');
  if(ampmEl) ampmEl.textContent=now.getHours()>=12?'PM':'AM';
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  fcFlipDigit('h1',hh[0]); fcFlipDigit('h2',hh[1]);
  fcFlipDigit('m1',mm[0]); fcFlipDigit('m2',mm[1]);
  fcFlipDigit('s1',ss[0]); fcFlipDigit('s2',ss[1]);
  const dateEl = document.getElementById('ss-date');
  if(dateEl){
    dateEl.textContent = now.getFullYear()+' · '+
      String(now.getMonth()+1).padStart(2,'0')+'.'+
      String(now.getDate()).padStart(2,'0')+
      '  周'+WEEK_CN[now.getDay()];
  }
  updateSSProgress();
}

function showScreensaver(){
  if(ssVisible) return;
  ssVisible = true;
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  fcSetAll('h1',hh[0]); fcSetAll('h2',hh[1]);
  fcSetAll('m1',mm[0]); fcSetAll('m2',mm[1]);
  fcSetAll('s1',ss[0]); fcSetAll('s2',ss[1]);
  tickSS();
  document.getElementById('screensaver').classList.add('visible');
  ssIntervalId = setInterval(tickSS, 1000);
}

function dismissScreensaver(){
  if(!ssVisible) return;
  ssVisible = false;
  document.getElementById('screensaver').classList.remove('visible');
  if(ssIntervalId){clearInterval(ssIntervalId);ssIntervalId=null;}
  Object.keys(fcCur).forEach(k=>fcCur[k]='');
  resetIdleTimer();
}

function resetIdleTimer(){
  if(idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(showScreensaver, IDLE_MS);
}

['click','touchstart','mousemove','keydown'].forEach(evt=>{
  document.addEventListener(evt,(e)=>{
    if(e.target.closest('#screensaver')) return;
    if(ssVisible){dismissScreensaver();return;}
    resetIdleTimer();
  },{passive:true});
});

function boot(){
  load();checkReset();updateClock();render();
  restoreMascot();
  setInterval(()=>{updateClock();checkReset();render();scheduleSweepCheck();},60000);
  showScreensaver(); // show flip clock immediately on load
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',()=>preloadGifs(boot));
}else{
  preloadGifs(boot);
}
</script>
