<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>家务中控</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#E8340A;
  --black:#111111;
  --gray:#888888;
  --gray-light:#EEEEEE;
  --gray-mid:#CCCCCC;
  --white:#FFFFFF;
  --done-bg:#F5F5F5;
  --done-text:#AAAAAA;
  --border:1px solid var(--black);
  --border-light:1px solid var(--gray-mid);
}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--white);color:var(--black);
  font-family:'Noto Sans SC',sans-serif;
  font-weight:300;
  -webkit-font-smoothing:antialiased;
}

/* ── GRID ── */
.layout{
  display:grid;
  grid-template-columns:260px 1fr;
  grid-template-rows:100vh;
  height:100vh;
}

/* ── LEFT ── */
.left{
  border-right:var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
}

.left-top{
  padding:36px 28px 28px;
  border-bottom:var(--border);
}

/* big clock */
.clock-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:96px;line-height:0.88;
  letter-spacing:2px;
  color:var(--black);
}
.clock-date{
  font-size:11px;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--gray);
  margin-top:10px;
}

/* progress section */
.left-mid{
  padding:24px 28px;
  border-bottom:var(--border);
  flex-shrink:0;
}
.section-label{
  font-size:9px;font-weight:500;
  letter-spacing:0.18em;text-transform:uppercase;
  color:var(--gray);margin-bottom:16px;
}
.stat-rows{display:flex;flex-direction:column;gap:12px;}
.stat-row{display:flex;align-items:center;gap:10px;}
.stat-name{font-size:12px;color:var(--black);width:30px;flex-shrink:0;}
.bar-track{flex:1;height:2px;background:var(--gray-light);position:relative;}
.bar-fill{
  height:100%;background:var(--black);
  transition:width 0.6s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.bar-fill.full{background:var(--red);}
.stat-frac{font-size:11px;color:var(--gray);min-width:28px;text-align:right;}

/* summary numbers */
.left-nums{
  padding:24px 28px;
  border-bottom:var(--border);
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:0;
}
.num-cell{text-align:center;padding:0 4px;}
.num-cell+.num-cell{border-left:var(--border-light);}
.num-big{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;color:var(--black);}
.num-big.accent{color:var(--red);}
.num-label{font-size:10px;color:var(--gray);letter-spacing:0.06em;margin-top:4px;}

/* status text */
.left-status{
  padding:20px 28px;
  font-size:12px;color:var(--gray);
  line-height:1.6;
}
.left-status strong{color:var(--black);font-weight:500;}

/* reset notice */
.reset-notice{
  margin:0 28px;
  font-size:11px;color:var(--red);
  background:rgba(232,52,10,0.06);
  border:1px solid rgba(232,52,10,0.25);
  padding:8px 12px;line-height:1.5;
  display:none;
}
.reset-notice.show{display:block;}

/* mascot */
.mascot-wrap{
  position:absolute;bottom:0;right:0;
  width:90px;height:90px;
  display:flex;align-items:flex-end;justify-content:flex-end;
  pointer-events:none;
  overflow:hidden;
}
.mascot-img{
  width:72px;height:72px;
  image-rendering:pixelated;
  object-fit:contain;
}

/* ── RIGHT ── */
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--white);}

/* tabbar */
.tabbar{
  display:flex;align-items:stretch;
  border-bottom:var(--border);
  padding:0 36px;
  flex-shrink:0;
  gap:0;
}
.tab-btn{
  padding:0 18px;height:56px;
  font-size:11px;font-weight:500;
  letter-spacing:0.14em;text-transform:uppercase;
  color:var(--gray);
  background:none;border:none;
  border-bottom:2px solid transparent;
  cursor:pointer;
  transition:color 0.15s;
  white-space:nowrap;
  font-family:'Noto Sans SC',sans-serif;
}
.tab-btn.active{color:var(--black);border-bottom-color:var(--red);}
.tab-btn:hover:not(.active){color:var(--black);}

.tabbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}

.hdr-btn{
  font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--gray);background:none;
  border:1px solid var(--gray-mid);
  padding:7px 16px;cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
  font-family:'Noto Sans SC',sans-serif;
}
.hdr-btn:hover{color:var(--black);border-color:var(--black);}
.hdr-btn.accent{color:var(--red);border-color:var(--red);}
.hdr-btn.accent:hover{background:var(--red);color:var(--white);}

/* scroll area */
.task-scroll{flex:1;overflow-y:auto;padding:32px 36px 40px;}
.task-scroll::-webkit-scrollbar{width:2px;}
.task-scroll::-webkit-scrollbar-thumb{background:var(--gray-mid);}

.tab-content{display:none;}
.tab-content.active{display:block;}

/* section */
.section{margin-bottom:32px;}
.sec-header{
  display:flex;align-items:center;gap:0;
  margin-bottom:0;
  border-top:var(--border);
  padding-top:12px;
  margin-bottom:10px;
}
.sec-name{
  font-size:9px;font-weight:500;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--gray);
  flex:1;
}
.sec-add{
  font-size:10px;font-weight:500;letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--gray);background:none;border:none;
  cursor:pointer;padding:0;
  transition:color 0.15s;
  font-family:'Noto Sans SC',sans-serif;
}
.sec-add:hover{color:var(--red);}

/* task rows */
.task-list{display:flex;flex-direction:column;gap:0;}

.task-card{
  display:flex;align-items:center;gap:16px;
  padding:16px 0;
  border-bottom:var(--border-light);
  cursor:pointer;
  transition:background 0.1s;
  position:relative;
}
.task-card:first-child{border-top:var(--border-light);}
.task-card:hover{background:#FAFAFA;margin:0 -12px;padding-left:12px;padding-right:12px;}

/* checkbox — Swiss square */
.t-check{
  width:20px;height:20px;
  border:1.5px solid var(--black);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.task-card.done .t-check{
  background:var(--black);
  border-color:var(--black);
}
.t-tick{
  width:10px;height:7px;
  border-left:2px solid var(--white);
  border-bottom:2px solid var(--white);
  transform:rotate(-45deg) translateY(-1px);
  opacity:0;transition:opacity 0.12s;
}
.task-card.done .t-tick{opacity:1;}

/* name */
.t-name{
  font-size:16px;font-weight:300;
  color:var(--black);flex:1;
  line-height:1.3;
}
.task-card.done .t-name{
  color:var(--done-text);
  text-decoration:line-through;
  text-decoration-color:var(--gray-mid);
}

/* tags */
.t-tags{display:flex;gap:5px;flex-shrink:0;}
.tag{
  font-size:9px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  padding:3px 8px;
}
.tag-warn{background:var(--red);color:var(--white);}
.tag-bi{border:1px solid var(--black);color:var(--black);}
.tag-plant{border:1px solid var(--gray);color:var(--gray);}

.t-date{font-size:11px;color:var(--gray);flex-shrink:0;}

.t-del{
  width:22px;height:22px;
  background:none;border:none;
  color:var(--gray-mid);font-size:16px;
  cursor:pointer;display:none;
  align-items:center;justify-content:center;
  line-height:1;flex-shrink:0;
  transition:color 0.15s;
}
.task-card:hover .t-del{display:flex;}
.t-del:hover{color:var(--red);}

/* inline add */
.inline-add-row{
  display:flex;align-items:center;gap:8px;
  padding:12px 0;border-bottom:var(--border-light);
}
.inline-input{
  flex:1;
  border:none;border-bottom:2px solid var(--black);
  padding:8px 0;font-size:15px;
  font-family:'Noto Sans SC',sans-serif;
  color:var(--black);outline:none;background:none;
}
.inline-input::placeholder{color:var(--gray-mid);}
.inline-ok{
  padding:8px 18px;font-size:10px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  background:var(--black);color:var(--white);
  border:none;cursor:pointer;
  font-family:'Noto Sans SC',sans-serif;
  transition:background 0.15s;
}
.inline-ok:hover{background:var(--red);}
.inline-cancel{
  padding:8px 12px;font-size:10px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  background:none;color:var(--gray);
  border:1px solid var(--gray-mid);cursor:pointer;
  font-family:'Noto Sans SC',sans-serif;
  transition:all 0.15s;
}
.inline-cancel:hover{border-color:var(--black);color:var(--black);}

/* history */
.hist-group{margin-bottom:28px;}
.hist-group-label{
  font-size:9px;font-weight:500;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--gray);
  padding-bottom:10px;
  border-bottom:var(--border);
  margin-bottom:0;
}
.hist-row{
  display:flex;align-items:center;gap:16px;
  padding:14px 0;border-bottom:var(--border-light);
  font-size:15px;
}
.hist-date{color:var(--red);min-width:72px;font-size:12px;letter-spacing:0.05em;}
.hist-name{color:var(--black);flex:1;}
.hist-tab{color:var(--gray);font-size:11px;}
.empty-hist{font-size:14px;color:var(--gray);text-align:center;padding:60px 0;line-height:2.2;letter-spacing:0.05em;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--white);
  border:var(--border);
  padding:36px 36px 32px;
  width:380px;
  transform:translateY(8px);transition:transform 0.2s;
}
.modal-bg.show .modal{transform:translateY(0);}
.modal-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;letter-spacing:2px;
  margin-bottom:24px;color:var(--black);
}
.modal label{
  display:block;font-size:9px;font-weight:500;
  letter-spacing:0.16em;text-transform:uppercase;
  color:var(--gray);margin-bottom:6px;
}
.modal input,.modal select{
  width:100%;
  border:none;border-bottom:1.5px solid var(--black);
  padding:9px 0;font-size:14px;
  font-family:'Noto Sans SC',sans-serif;
  color:var(--black);outline:none;
  margin-bottom:18px;background:none;
}
.modal input:focus,.modal select:focus{border-bottom-color:var(--red);}
.modal select option{background:var(--white);}
.modal-row{display:flex;gap:8px;margin-top:8px;}
.m-cancel{
  flex:1;padding:12px;
  background:none;border:1px solid var(--gray-mid);
  color:var(--gray);font-size:11px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;font-family:'Noto Sans SC',sans-serif;
  transition:all 0.15s;
}
.m-cancel:hover{border-color:var(--black);color:var(--black);}
.m-ok{
  flex:1;padding:12px;
  background:var(--black);border:none;
  color:var(--white);font-size:11px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;font-family:'Noto Sans SC',sans-serif;
  transition:background 0.15s;
}
.m-ok:hover{background:var(--red);}

/* red accent line top */
.left::before{content:'';display:block;height:4px;background:var(--red);flex-shrink:0;}
</style>
</head>
<body>
<div class="layout">

  <!-- LEFT -->
  <aside class="left">
    <div class="left-top">
      <div class="clock-num" id="clock">00:00</div>
      <div class="clock-date" id="dateline">--</div>
    </div>

    <div class="left-mid">
      <div class="section-label">完成进度</div>
      <div class="stat-rows">
        <div class="stat-row">
          <span class="stat-name">每天</span>
          <div class="bar-track"><div class="stat-bar bar-fill" id="bar-d" style="width:0%"></div></div>
          <span class="stat-frac" id="frac-d">0/0</span>
        </div>
        <div class="stat-row">
          <span class="stat-name">每周</span>
          <div class="bar-track"><div class="stat-bar bar-fill" id="bar-w" style="width:0%"></div></div>
          <span class="stat-frac" id="frac-w">0/0</span>
        </div>
        <div class="stat-row">
          <span class="stat-name">每月</span>
          <div class="bar-track"><div class="stat-bar bar-fill" id="bar-m" style="width:0%"></div></div>
          <span class="stat-frac" id="frac-m">0/0</span>
        </div>
      </div>
    </div>

    <div class="left-nums">
      <div class="num-cell">
        <div class="num-big accent" id="sum-done">0</div>
        <div class="num-label">已完成</div>
      </div>
      <div class="num-cell">
        <div class="num-big" id="sum-remain">0</div>
        <div class="num-label">待完成</div>
      </div>
      <div class="num-cell">
        <div class="num-big" id="sum-pct">0%</div>
        <div class="num-label">完成率</div>
      </div>
    </div>

    <div class="left-status" id="left-status">加载中…</div>
    <div class="reset-notice" id="reset-notice"></div>

    <!-- mascot -->
    <div class="mascot-wrap">
      <img class="mascot-img" id="mascot" src="clawd-idle.gif" alt="">
    </div>
  </aside>

  <!-- RIGHT -->
  <main class="right">
    <div class="tabbar">
      <button class="tab-btn active" onclick="switchTab('daily')">每天</button>
      <button class="tab-btn" onclick="switchTab('weekly')">每周</button>
      <button class="tab-btn" onclick="switchTab('monthly')">每月 / 季度</button>
      <button class="tab-btn" onclick="switchTab('history')">完成记录</button>
      <div class="tabbar-right">
        <button class="hdr-btn" id="reset-btn" onclick="resetCurrent()">重置本周期</button>
        <button class="hdr-btn accent" id="add-btn" onclick="openGlobalModal()">+ 新增任务</button>
      </div>
    </div>

    <div class="task-scroll">
      <div id="tab-daily"   class="tab-content active"></div>
      <div id="tab-weekly"  class="tab-content"></div>
      <div id="tab-monthly" class="tab-content"></div>
      <div id="tab-history" class="tab-content">
        <div id="history-list"></div>
      </div>
    </div>
  </main>
</div>

<!-- modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">新增任务</div>
    <label>任务名称</label>
    <input type="text" id="g-name" placeholder="例：擦纱窗">
    <label>频率</label>
    <select id="g-tab">
      <option value="daily">每天</option>
      <option value="weekly" selected>每周</option>
      <option value="monthly">每月 / 季度</option>
    </select>
    <label>分组名称（留空归入「自定义」）</label>
    <input type="text" id="g-sec" placeholder="例：全屋清扫">
    <label>标签</label>
    <select id="g-tag">
      <option value="">无</option>
      <option value="warn">重点</option>
      <option value="bi">隔周</option>
      <option value="plant">植物</option>
    </select>
    <div class="modal-row">
      <button class="m-cancel" onclick="closeModal()">取消</button>
      <button class="m-ok" onclick="globalAdd()">添加</button>
    </div>
  </div>
</div>

<script>
// ── data ─────────────────────────────────────────────────
const DEFAULT={
  daily:{sections:[
    {label:"饭后顺手",tasks:[{id:"d1",name:"擦灶台",warn:true},{id:"d2",name:"洗碗后擦干净水槽"},{id:"d3",name:"厨余垃圾及时处理"}]},
    {label:"睡前 5 分钟",tasks:[{id:"d4",name:"杂物归位"},{id:"d5",name:"垃圾桶超过半桶就倒"},{id:"d6",name:"沙发 / 床上物品整理"}]}
  ]},
  weekly:{sections:[
    {label:"全屋清扫",tasks:[{id:"w1",name:"吸尘 / 扫地（含地毯）"},{id:"w2",name:"拖地"},{id:"w3",name:"桌面台面搁板擦拭"},{id:"w4",name:"镜子擦亮"}]},
    {label:"植物",tasks:[{id:"w5",name:"浇花",plant:true},{id:"w6",name:"检查叶片 / 修剪枯叶",plant:true}]},
    {label:"卫生间",tasks:[{id:"w7",name:"马桶内外清洁",warn:true},{id:"w8",name:"洗手台水槽擦拭",warn:true},{id:"w9",name:"浴室地板冲洗"},{id:"w10",name:"毛巾浴巾换洗"}]},
    {label:"厨房",tasks:[{id:"w11",name:"灶台深度清洁",warn:true},{id:"w12",name:"油烟机外表面擦拭",warn:true},{id:"w13",name:"微波炉 / 烤箱内部"},{id:"w14",name:"水槽周边清洁"}]},
    {label:"隔周轮换",tasks:[{id:"w15",name:"床单被套换洗",bi:true},{id:"w16",name:"枕套换洗",bi:true},{id:"w17",name:"衣柜整理",bi:true},{id:"w18",name:"洗衣机筒自洁",bi:true},{id:"w19",name:"全屋杀虫",bi:true,warn:true}]}
  ]},
  monthly:{sections:[
    {label:"每月一次",tasks:[{id:"m1",name:"床垫除螨",warn:true},{id:"m2",name:"沙发除螨",warn:true},{id:"m3",name:"枕头除螨或晾晒",warn:true},{id:"m4",name:"冰箱内部清洁"},{id:"m5",name:"马桶瓷砖缝刷洗",warn:true},{id:"m6",name:"洗衣机槽深度清洁"},{id:"m7",name:"高处角落掸灰"},{id:"m8",name:"风扇叶片灯罩除尘"},{id:"m9",name:"床底沙发底吸尘"},{id:"m10",name:"开关面板门把手消毒"}]},
    {label:"每季度一次",tasks:[{id:"q1",name:"地毯深度清洗",warn:true},{id:"q2",name:"油烟机拆洗",warn:true},{id:"q3",name:"空调滤网清洗"},{id:"q4",name:"窗户纱窗清洗"},{id:"q5",name:"阳台大扫除"},{id:"q6",name:"被子枕头晾晒"},{id:"q7",name:"柜子内部整理"}]}
  ]}
};

// ── storage ───────────────────────────────────────────────
let appData,state,history,lastKeys;
function load(){
  try{appData =JSON.parse(localStorage.getItem('hd_data'));}catch(e){}
  try{state   =JSON.parse(localStorage.getItem('hd_state'));}catch(e){}
  try{history =JSON.parse(localStorage.getItem('hd_history'));}catch(e){}
  try{lastKeys=JSON.parse(localStorage.getItem('hd_lastkeys'));}catch(e){}
  if(!appData) appData=JSON.parse(JSON.stringify(DEFAULT));
  if(!state)   state={};
  if(!history) history=[];
  if(!lastKeys)lastKeys={};
}
function save(){
  try{
    localStorage.setItem('hd_data',    JSON.stringify(appData));
    localStorage.setItem('hd_state',   JSON.stringify(state));
    localStorage.setItem('hd_history', JSON.stringify(history));
    localStorage.setItem('hd_lastkeys',JSON.stringify(lastKeys));
  }catch(e){}
}

// ── time ──────────────────────────────────────────────────
const DAYS=['日','一','二','三','四','五','六'];
const TNAMES={daily:'每天',weekly:'每周',monthly:'每月/季度'};
function fmtDate(d){return(d.getMonth()+1)+'月'+d.getDate()+'日';}
function dayKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function weekKey(d){const dy=d.getDay()||7;const m=new Date(d);m.setDate(d.getDate()-dy+1);return m.getFullYear()+'-'+(m.getMonth()+1)+'-'+m.getDate();}
function monthKey(d){return d.getFullYear()+'-'+(d.getMonth()+1);}

// ── mascot ────────────────────────────────────────────────
const GIFS={idle:'clawd-idle.gif',sweep:'clawd-sweeping.gif',happy:'clawd-happy.gif'};
let mascotState='idle';
let happyTimer=null;
let sweepActive=false;

function setMascot(state){
  mascotState=state;
  document.getElementById('mascot').src=GIFS[state]+'?t='+Date.now();
}

function triggerHappy(){
  if(happyTimer)clearTimeout(happyTimer);
  setMascot('happy');
  // after happy gif plays (~2s), return to idle or sweep
  happyTimer=setTimeout(()=>{
    happyTimer=null;
    checkSweepOrIdle();
  },2200);
}

function checkSweepOrIdle(){
  if(happyTimer)return; // happy takes priority
  const h=new Date().getHours();
  if(h>=18){
    if(!sweepActive){
      sweepActive=true;
      setMascot('sweep');
    }
  } else {
    if(sweepActive){
      sweepActive=false;
      setMascot('idle');
    }
  }
}

// randomise sweep trigger after 18:00
function scheduleSweepCheck(){
  const now=new Date();
  const h=now.getHours();
  if(h>=18 && !sweepActive && mascotState!=='happy'){
    // random chance each minute
    if(Math.random()<0.4) checkSweepOrIdle();
  } else if(h<18 && sweepActive){
    sweepActive=false;
    if(mascotState!=='happy') setMascot('idle');
  }
}

// ── auto-reset ────────────────────────────────────────────
let resetMsgs=[];
function archiveReset(tabId,label){
  const ds=fmtDate(new Date());
  appData[tabId].sections.forEach(s=>s.tasks.forEach(t=>{
    if(state[t.id]){history.unshift({date:state[t.id],name:t.name,tab:tabId,archivedAt:ds,ts:Date.now()});state[t.id]=null;}
  }));
  if(history.length>500)history.length=500;
  resetMsgs.push(label+'任务已自动归档');
}
function checkReset(){
  const now=new Date();resetMsgs=[];
  const dk=dayKey(now),wk=weekKey(now),mk=monthKey(now);
  if(lastKeys.daily   &&lastKeys.daily!==dk)  archiveReset('daily','每天');
  if(lastKeys.weekly  &&lastKeys.weekly!==wk) archiveReset('weekly','每周');
  if(lastKeys.monthly &&lastKeys.monthly!==mk)archiveReset('monthly','每月');
  lastKeys.daily=dk;lastKeys.weekly=wk;lastKeys.monthly=mk;
  save();
  if(resetMsgs.length){
    const n=document.getElementById('reset-notice');
    n.textContent=resetMsgs.join('；');
    n.classList.add('show');
    setTimeout(()=>n.classList.remove('show'),7000);
  }
}

// ── clock ─────────────────────────────────────────────────
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  document.getElementById('dateline').textContent=
    now.getFullYear()+' / '+(now.getMonth()+1)+'.'+String(now.getDate()).padStart(2,'0')
    +'  WED'.replace('WED','周'+DAYS[now.getDay()]);
}

// ── left panel ────────────────────────────────────────────
function updateLeft(){
  let ta=0,da=0;
  ['daily','weekly','monthly'].forEach((id,i)=>{
    const k=['d','w','m'][i];
    let t=0,d=0;
    appData[id].sections.forEach(s=>s.tasks.forEach(tk=>{t++;if(state[tk.id])d++;}));
    const pct=t?Math.round(d/t*100):0;
    const barEl=document.getElementById('bar-'+k);
    barEl.style.width=pct+'%';
    barEl.classList.toggle('full',pct===100);
    document.getElementById('frac-'+k).textContent=d+'/'+t;
    ta+=t;da+=d;
  });
  document.getElementById('sum-done').textContent=da;
  document.getElementById('sum-remain').textContent=ta-da;
  document.getElementById('sum-pct').textContent=ta?Math.round(da/ta*100)+'%':'—';
  const rem=ta-da;
  const st=document.getElementById('left-status');
  if(rem===0) st.innerHTML='<strong>全部完成</strong>，今天辛苦了。';
  else st.innerHTML='还有 <strong>'+rem+'</strong> 项待完成';
}

// ── toggle ────────────────────────────────────────────────
function toggle(id,tabId){
  if(state[id]){state[id]=null;}
  else{
    const ds=fmtDate(new Date());state[id]=ds;
    let name='';appData[tabId].sections.forEach(s=>s.tasks.forEach(t=>{if(t.id===id)name=t.name;}));
    history.unshift({date:ds,name,tab:tabId,ts:Date.now()});
    if(history.length>500)history.length=500;
    triggerHappy();
  }
  save();render();
}

function delTask(tabId,secLabel,id,e){
  e.stopPropagation();
  const s=appData[tabId].sections.find(s=>s.label===secLabel);
  if(s)s.tasks=s.tasks.filter(t=>t.id!==id);
  delete state[id];save();render();
}

// ── inline add ────────────────────────────────────────────
let openAddSec=null;
function showInlineAdd(tabId,secLabel){
  openAddSec={tabId,secLabel};render();
  setTimeout(()=>{const i=document.getElementById('inline-inp');if(i)i.focus();},60);
}
function inlineConfirm(){
  const inp=document.getElementById('inline-inp');if(!inp)return;
  const name=inp.value.trim();
  if(!name){openAddSec=null;render();return;}
  const {tabId,secLabel}=openAddSec;
  const s=appData[tabId].sections.find(s=>s.label===secLabel);
  if(s)s.tasks.push({id:'c'+Date.now(),name});
  openAddSec=null;save();render();
}
function inlineCancel(){openAddSec=null;render();}

// ── render ────────────────────────────────────────────────
let currentTab='daily';

function renderTaskTab(tabId){
  const container=document.getElementById('tab-'+tabId);
  const tab=appData[tabId];
  let html='';
  tab.sections.forEach(sec=>{
    const isOpen=openAddSec&&openAddSec.tabId===tabId&&openAddSec.secLabel===sec.label;
    if(!sec.tasks.length&&!isOpen)return;
    html+=`<div class="section">
      <div class="sec-header">
        <span class="sec-name">${sec.label}</span>
        <button class="sec-add" onclick="showInlineAdd('${tabId}','${sec.label}')">+ 添加</button>
      </div>
      <div class="task-list">`;
    sec.tasks.forEach(task=>{
      const done=!!state[task.id];
      let tags='';
      if(task.warn) tags+=`<span class="tag tag-warn">重点</span>`;
      if(task.bi)   tags+=`<span class="tag tag-bi">隔周</span>`;
      if(task.plant)tags+=`<span class="tag tag-plant">植物</span>`;
      const dateStr=done?`<span class="t-date">${state[task.id]}</span>`:'';
      html+=`<div class="task-card ${done?'done':''}" onclick="toggle('${task.id}','${tabId}')">
        <div class="t-check"><div class="t-tick"></div></div>
        <span class="t-name">${task.name}</span>
        <div class="t-tags">${tags}</div>
        ${dateStr}
        <button class="t-del" onclick="delTask('${tabId}','${sec.label}','${task.id}',event)">×</button>
      </div>`;
    });
    html+='</div>';
    if(isOpen){
      html+=`<div class="inline-add-row">
        <input class="inline-input" id="inline-inp" placeholder="任务名称，回车确认"
          onkeydown="if(event.key==='Enter')inlineConfirm();if(event.key==='Escape')inlineCancel();">
        <button class="inline-ok" onclick="inlineConfirm()">确认</button>
        <button class="inline-cancel" onclick="inlineCancel()">取消</button>
      </div>`;
    }
    html+='</div>';
  });
  container.innerHTML=html;
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!history.length){el.innerHTML=`<div class="empty-hist">还没有完成记录<br>打勾任务后会在这里显示</div>`;return;}
  const groups={};
  history.slice(0,300).forEach(h=>{
    const k=h.archivedAt?h.archivedAt+'（自动归档）':h.date;
    if(!groups[k])groups[k]=[];groups[k].push(h);
  });
  let html='';
  Object.keys(groups).forEach(k=>{
    html+=`<div class="hist-group"><div class="hist-group-label">${k}</div>`;
    groups[k].forEach(h=>{html+=`<div class="hist-row"><span class="hist-date">${h.date}</span><span class="hist-name">${h.name}</span><span class="hist-tab">${TNAMES[h.tab]||''}</span></div>`;});
    html+='</div>';
  });
  el.innerHTML=html;
}

function render(){
  if(currentTab==='history')renderHistory();
  else renderTaskTab(currentTab);
  updateLeft();
}

function switchTab(tabId){
  openAddSec=null;currentTab=tabId;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['daily','weekly','monthly','history'][i]===tabId);
  });
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tabId).classList.add('active');
  const show=tabId!=='history';
  document.getElementById('reset-btn').style.display=show?'':'none';
  document.getElementById('add-btn').style.display=show?'':'none';
  render();
}

function resetCurrent(){
  if(currentTab==='history')return;
  archiveReset(currentTab,TNAMES[currentTab]);save();render();
}

// ── global modal ──────────────────────────────────────────
function openGlobalModal(){
  document.getElementById('g-name').value='';
  document.getElementById('g-sec').value='';
  document.getElementById('g-tag').value='';
  document.getElementById('g-tab').value=currentTab==='history'?'weekly':currentTab;
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('g-name').focus(),80);
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function globalAdd(){
  const name=document.getElementById('g-name').value.trim();if(!name)return;
  const tabId=document.getElementById('g-tab').value;
  const secLabel=document.getElementById('g-sec').value.trim()||'自定义';
  const tag=document.getElementById('g-tag').value;
  const task={id:'c'+Date.now(),name};
  if(tag==='warn')task.warn=true;
  if(tag==='bi')  task.bi=true;
  if(tag==='plant')task.plant=true;
  let sec=appData[tabId].sections.find(s=>s.label===secLabel);
  if(!sec){sec={label:secLabel,tasks:[]};appData[tabId].sections.push(sec);}
  sec.tasks.push(task);save();closeModal();
  if(currentTab!==tabId)switchTab(tabId);else render();
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('g-name').addEventListener('keydown',e=>{if(e.key==='Enter')globalAdd();if(e.key==='Escape')closeModal();});

// ── boot ──────────────────────────────────────────────────
load();
checkReset();
updateClock();
render();
checkSweepOrIdle();

setInterval(()=>{
  updateClock();
  checkReset();
  render();
  scheduleSweepCheck();
},60000);
</script>
</body>
</html>
