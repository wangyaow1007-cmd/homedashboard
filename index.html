<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>家务中控</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#2a2620;
  --surface:#322e28;
  --surface2:#3a3530;
  --surface3:#403b35;
  --border:rgba(255,245,230,0.08);
  --border2:rgba(255,245,230,0.15);
  --text:#f5f0e8;
  --muted:rgba(245,240,232,0.55);
  --hint:rgba(245,240,232,0.32);
  --gold:#d4b896;
  --teal:#8ec4b8;
  --purple:#b0a2cc;
  --warn:#d9935e;
  --green:#8abb8a;
  --done-bg:rgba(142,196,184,0.1);
  --done-text:#8ec4b8;
  --r:16px;
  --r-sm:10px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;}

.layout{display:grid;grid-template-columns:280px 1fr;height:100vh;}

/* ── LEFT ── */
.left{
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:44px 30px 36px;
  overflow:hidden;position:relative;
}

.time-big{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;font-size:88px;
  line-height:0.9;letter-spacing:-4px;
  color:var(--text);
}
.time-date{
  font-size:13px;color:var(--muted);
  margin-top:14px;letter-spacing:0.07em;
  text-transform:uppercase;
}
.time-block{margin-bottom:44px;}

.ldivider{height:1px;background:var(--border);margin-bottom:30px;}

/* progress bars */
.stat-group{display:flex;flex-direction:column;gap:18px;margin-bottom:36px;}
.stat-row{display:flex;align-items:center;gap:12px;}
.stat-label{font-size:13px;color:var(--muted);width:34px;flex-shrink:0;}
.stat-bar-wrap{flex:1;height:3px;background:var(--border2);border-radius:3px;overflow:hidden;}
.stat-bar{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(.4,0,.2,1);}
.bar-d{background:var(--teal);}
.bar-w{background:var(--gold);}
.bar-m{background:var(--purple);}
.stat-nums{font-size:13px;color:var(--muted);min-width:36px;text-align:right;}

.ldivider2{height:1px;background:var(--border);margin-bottom:28px;}

/* summary cards */
.today-label{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--hint);margin-bottom:16px;}
.sum-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sum-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px 10px;text-align:center;}
.sum-big{font-size:30px;font-weight:400;line-height:1;color:var(--text);margin-bottom:5px;}
.sum-small{font-size:11px;color:var(--muted);letter-spacing:0.05em;}

.left-bottom{margin-top:auto;padding-top:24px;border-top:1px solid var(--border);}
.status-line{font-size:13px;color:var(--muted);line-height:1.6;}
.status-line span{color:var(--gold);font-weight:400;}

.reset-notice{font-size:12px;color:var(--teal);background:rgba(142,196,184,0.08);border:1px solid rgba(142,196,184,0.18);border-radius:var(--r-sm);padding:9px 13px;margin-top:14px;line-height:1.5;display:none;}
.reset-notice.show{display:block;}

/* ── RIGHT ── */
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

.tabbar{display:flex;align-items:stretch;border-bottom:1px solid var(--border);padding:0 40px;flex-shrink:0;}
.tab-btn{padding:22px 20px 20px;font-size:12px;font-weight:400;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;transition:color 0.2s;white-space:nowrap;}
.tab-btn.active{color:var(--text);border-bottom-color:var(--gold);}
.tab-btn:hover:not(.active){color:var(--text);}
.tabbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hdr-btn{font-size:11px;letter-spacing:0.05em;color:var(--hint);background:none;border:1px solid var(--border);border-radius:20px;padding:6px 16px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.hdr-btn:hover{color:var(--muted);border-color:var(--border2);}
.hdr-btn.accent{color:var(--gold);border-color:rgba(212,184,150,0.28);}
.hdr-btn.accent:hover{background:rgba(212,184,150,0.08);}

.task-scroll{flex:1;overflow-y:auto;padding:32px 40px 40px;}
.task-scroll::-webkit-scrollbar{width:2px;}
.task-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.tab-content{display:none;}
.tab-content.active{display:block;}

/* section */
.section{margin-bottom:36px;}
.sec-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.sec-name{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--hint);white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--border);}
.sec-add{font-size:12px;color:var(--hint);background:none;border:none;cursor:pointer;letter-spacing:0.05em;padding:2px 0;transition:color 0.2s;white-space:nowrap;}
.sec-add:hover{color:var(--gold);}

/* single-column task list */
.task-list{display:flex;flex-direction:column;gap:6px;}

.task-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px 22px;
  cursor:pointer;
  transition:background 0.15s,border-color 0.15s;
  display:flex;align-items:center;gap:16px;
  position:relative;
}
.task-card:hover{background:var(--surface2);border-color:var(--border2);}
.task-card.done{background:var(--done-bg);border-color:rgba(142,196,184,0.14);}

.t-check{
  width:24px;height:24px;border-radius:50%;
  border:1.5px solid var(--border2);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.task-card.done .t-check{background:var(--teal);border-color:var(--teal);}
.t-tick{width:10px;height:7px;border-left:2px solid #2a2620;border-bottom:2px solid #2a2620;transform:rotate(-45deg) translateY(-1px);opacity:0;transition:opacity 0.15s;}
.task-card.done .t-tick{opacity:1;}

.t-body{flex:1;min-width:0;display:flex;align-items:center;gap:12px;}
.t-name{font-size:16px;color:var(--text);line-height:1.4;flex:1;}
.task-card.done .t-name{color:var(--done-text);text-decoration:line-through;text-decoration-color:rgba(142,196,184,0.4);}

.t-tags{display:flex;gap:5px;flex-shrink:0;}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;letter-spacing:0.03em;}
.tag-warn{background:rgba(217,147,94,0.16);color:var(--warn);}
.tag-bi{background:rgba(212,184,150,0.14);color:var(--gold);}
.tag-plant{background:rgba(138,187,138,0.14);color:var(--green);}

.t-date{font-size:12px;color:var(--done-text);opacity:0.65;flex-shrink:0;}

.t-del{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:none;border:none;color:var(--hint);font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;transition:all 0.15s;}
.task-card:hover .t-del{display:flex;}
.t-del:hover{background:rgba(217,147,94,0.2);color:var(--warn);}

/* inline add */
.inline-add-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.inline-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:14px 18px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s;}
.inline-input:focus{border-color:var(--gold);}
.inline-input::placeholder{color:var(--hint);}
.inline-ok{padding:14px 20px;font-size:13px;background:var(--gold);color:#1e1a14;border:none;border-radius:var(--r-sm);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap;transition:opacity 0.15s;}
.inline-ok:hover{opacity:0.88;}
.inline-cancel{padding:14px 16px;font-size:13px;background:none;color:var(--muted);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.inline-cancel:hover{border-color:var(--border2);}

/* history */
.history-list{padding:4px 0;}
.hist-group{margin-bottom:28px;}
.hist-group-label{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--hint);padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.hist-row{display:flex;align-items:center;gap:16px;padding:13px 0;border-bottom:1px solid var(--border);font-size:15px;}
.hist-row:last-child{border-bottom:none;}
.hist-date{color:var(--gold);min-width:76px;font-size:13px;}
.hist-name{color:var(--text);flex:1;}
.hist-tab{color:var(--muted);font-size:12px;}
.empty-hist{font-size:15px;color:var(--muted);text-align:center;padding:60px 0;line-height:2;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:32px 34px;width:380px;transform:translateY(10px);transition:transform 0.2s;}
.modal-bg.show .modal{transform:translateY(0);}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;margin-bottom:22px;letter-spacing:-0.5px;}
.modal label{display:block;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.modal input,.modal select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:12px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;margin-bottom:16px;}
.modal input:focus,.modal select:focus{border-color:var(--gold);}
.modal select option{background:var(--surface2);}
.modal-row{display:flex;gap:8px;margin-top:4px;}
.m-cancel{flex:1;padding:12px;background:none;border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--muted);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.m-ok{flex:1;padding:12px;background:var(--gold);border:none;border-radius:var(--r-sm);color:#1e1a14;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.m-ok:hover{opacity:0.9;}
</style>
</head>
<body>
<div class="layout">

  <aside class="left">
    <div class="time-block">
      <div class="time-big" id="clock">00:00</div>
      <div class="time-date" id="dateline">--</div>
    </div>

    <div class="ldivider"></div>

    <div class="stat-group">
      <div class="stat-row">
        <span class="stat-label">每天</span>
        <div class="stat-bar-wrap"><div class="stat-bar bar-d" id="bar-d" style="width:0%"></div></div>
        <span class="stat-nums" id="nums-d">0/0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">每周</span>
        <div class="stat-bar-wrap"><div class="stat-bar bar-w" id="bar-w" style="width:0%"></div></div>
        <span class="stat-nums" id="nums-w">0/0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">每月</span>
        <div class="stat-bar-wrap"><div class="stat-bar bar-m" id="bar-m" style="width:0%"></div></div>
        <span class="stat-nums" id="nums-m">0/0</span>
      </div>
    </div>

    <div class="ldivider2"></div>

    <div class="today-label">总体概览</div>
    <div class="sum-cards">
      <div class="sum-card">
        <div class="sum-big" id="sum-done">0</div>
        <div class="sum-small">已完成</div>
      </div>
      <div class="sum-card">
        <div class="sum-big" id="sum-remain">0</div>
        <div class="sum-small">待完成</div>
      </div>
      <div class="sum-card">
        <div class="sum-big" id="sum-pct">0%</div>
        <div class="sum-small">完成率</div>
      </div>
    </div>

    <div class="reset-notice" id="reset-notice"></div>

    <div class="left-bottom">
      <div class="status-line" id="status-line">加载中…</div>
    </div>
  </aside>

  <main class="right">
    <div class="tabbar">
      <button class="tab-btn active" onclick="switchTab('daily')">每天</button>
      <button class="tab-btn" onclick="switchTab('weekly')">每周</button>
      <button class="tab-btn" onclick="switchTab('monthly')">每月 / 季度</button>
      <button class="tab-btn" onclick="switchTab('history')">完成记录</button>
      <div class="tabbar-right">
        <button class="hdr-btn" id="reset-btn" onclick="resetCurrent()">重置本周期</button>
        <button class="hdr-btn accent" id="add-btn" onclick="openGlobalModal()">+ 新增任务</button>
      </div>
    </div>

    <div class="task-scroll">
      <div id="tab-daily"   class="tab-content active"></div>
      <div id="tab-weekly"  class="tab-content"></div>
      <div id="tab-monthly" class="tab-content"></div>
      <div id="tab-history" class="tab-content">
        <div class="history-list" id="history-list"></div>
      </div>
    </div>
  </main>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">新增任务</div>
    <label>任务名称</label>
    <input type="text" id="g-name" placeholder="例：擦纱窗">
    <label>频率</label>
    <select id="g-tab">
      <option value="daily">每天</option>
      <option value="weekly" selected>每周</option>
      <option value="monthly">每月 / 季度</option>
    </select>
    <label>分组名称</label>
    <input type="text" id="g-sec" placeholder="留空则归入「自定义」">
    <label>标签</label>
    <select id="g-tag">
      <option value="">无</option>
      <option value="warn">重点</option>
      <option value="bi">隔周</option>
      <option value="plant">植物</option>
    </select>
    <div class="modal-row">
      <button class="m-cancel" onclick="closeModal()">取消</button>
      <button class="m-ok" onclick="globalAdd()">添加</button>
    </div>
  </div>
</div>

<script>
const DEFAULT={
  daily:{sections:[
    {label:"饭后顺手",tasks:[{id:"d1",name:"擦灶台",warn:true},{id:"d2",name:"洗碗后擦干净水槽"},{id:"d3",name:"厨余垃圾及时处理"}]},
    {label:"睡前 5 分钟",tasks:[{id:"d4",name:"杂物归位"},{id:"d5",name:"垃圾桶超过半桶就倒"},{id:"d6",name:"沙发 / 床上物品整理"}]}
  ]},
  weekly:{sections:[
    {label:"全屋清扫",tasks:[{id:"w1",name:"吸尘 / 扫地（含地毯）"},{id:"w2",name:"拖地"},{id:"w3",name:"桌面台面搁板擦拭"},{id:"w4",name:"镜子擦亮"}]},
    {label:"植物",tasks:[{id:"w5",name:"浇花",plant:true},{id:"w6",name:"检查叶片 / 修剪枯叶",plant:true}]},
    {label:"卫生间",tasks:[{id:"w7",name:"马桶内外清洁",warn:true},{id:"w8",name:"洗手台水槽擦拭",warn:true},{id:"w9",name:"浴室地板冲洗"},{id:"w10",name:"毛巾浴巾换洗"}]},
    {label:"厨房",tasks:[{id:"w11",name:"灶台深度清洁",warn:true},{id:"w12",name:"油烟机外表面擦拭",warn:true},{id:"w13",name:"微波炉 / 烤箱内部"},{id:"w14",name:"水槽周边清洁"}]},
    {label:"隔周轮换",tasks:[{id:"w15",name:"床单被套换洗",bi:true},{id:"w16",name:"枕套换洗",bi:true},{id:"w17",name:"衣柜整理",bi:true},{id:"w18",name:"洗衣机筒自洁",bi:true},{id:"w19",name:"全屋杀虫",bi:true,warn:true}]}
  ]},
  monthly:{sections:[
    {label:"每月一次",tasks:[{id:"m1",name:"床垫除螨",warn:true},{id:"m2",name:"沙发除螨",warn:true},{id:"m3",name:"枕头除螨或晾晒",warn:true},{id:"m4",name:"冰箱内部清洁"},{id:"m5",name:"马桶瓷砖缝刷洗",warn:true},{id:"m6",name:"洗衣机槽深度清洁"},{id:"m7",name:"高处角落掸灰"},{id:"m8",name:"风扇叶片灯罩除尘"},{id:"m9",name:"床底沙发底吸尘"},{id:"m10",name:"开关面板门把手消毒"}]},
    {label:"每季度一次",tasks:[{id:"q1",name:"地毯深度清洗",warn:true},{id:"q2",name:"油烟机拆洗",warn:true},{id:"q3",name:"空调滤网清洗"},{id:"q4",name:"窗户纱窗清洗"},{id:"q5",name:"阳台大扫除"},{id:"q6",name:"被子枕头晾晒"},{id:"q7",name:"柜子内部整理"}]}
  ]}
};

let appData,state,history,lastKeys;
function load(){
  try{appData =JSON.parse(localStorage.getItem('hd_data'));}catch(e){}
  try{state   =JSON.parse(localStorage.getItem('hd_state'));}catch(e){}
  try{history =JSON.parse(localStorage.getItem('hd_history'));}catch(e){}
  try{lastKeys=JSON.parse(localStorage.getItem('hd_lastkeys'));}catch(e){}
  if(!appData) appData=JSON.parse(JSON.stringify(DEFAULT));
  if(!state)   state={};
  if(!history) history=[];
  if(!lastKeys)lastKeys={};
}
function save(){
  try{
    localStorage.setItem('hd_data',    JSON.stringify(appData));
    localStorage.setItem('hd_state',   JSON.stringify(state));
    localStorage.setItem('hd_history', JSON.stringify(history));
    localStorage.setItem('hd_lastkeys',JSON.stringify(lastKeys));
  }catch(e){}
}

const DAYS=['日','一','二','三','四','五','六'];
const TNAMES={daily:'每天',weekly:'每周',monthly:'每月/季度'};
function fmtDate(d){return(d.getMonth()+1)+'月'+d.getDate()+'日';}
function dayKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function weekKey(d){const dy=d.getDay()||7;const m=new Date(d);m.setDate(d.getDate()-dy+1);return m.getFullYear()+'-'+(m.getMonth()+1)+'-'+m.getDate();}
function monthKey(d){return d.getFullYear()+'-'+(d.getMonth()+1);}

let resetMsgs=[];
function archiveReset(tabId,label){
  const ds=fmtDate(new Date());
  appData[tabId].sections.forEach(s=>s.tasks.forEach(t=>{
    if(state[t.id]){history.unshift({date:state[t.id],name:t.name,tab:tabId,archivedAt:ds,ts:Date.now()});state[t.id]=null;}
  }));
  if(history.length>500)history.length=500;
  resetMsgs.push(label+'任务已自动归档');
}
function checkReset(){
  const now=new Date();resetMsgs=[];
  const dk=dayKey(now),wk=weekKey(now),mk=monthKey(now);
  if(lastKeys.daily   &&lastKeys.daily!==dk)  archiveReset('daily','每天');
  if(lastKeys.weekly  &&lastKeys.weekly!==wk) archiveReset('weekly','每周');
  if(lastKeys.monthly &&lastKeys.monthly!==mk)archiveReset('monthly','每月');
  lastKeys.daily=dk;lastKeys.weekly=wk;lastKeys.monthly=mk;
  save();
  if(resetMsgs.length){
    const n=document.getElementById('reset-notice');
    n.textContent=resetMsgs.join('；');
    n.classList.add('show');
    setTimeout(()=>n.classList.remove('show'),7000);
  }
}

function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  document.getElementById('dateline').textContent=now.getFullYear()+' · '+(now.getMonth()+1)+'月'+now.getDate()+'日  周'+DAYS[now.getDay()];
}

function updateLeft(){
  let ta=0,da=0;
  ['daily','weekly','monthly'].forEach(id=>{
    let t=0,d=0;
    appData[id].sections.forEach(s=>s.tasks.forEach(tk=>{t++;if(state[tk.id])d++;}));
    const pct=t?Math.round(d/t*100):0;
    document.getElementById('bar-'+id[0]).style.width=pct+'%';
    document.getElementById('nums-'+id[0]).textContent=d+'/'+t;
    ta+=t;da+=d;
  });
  document.getElementById('sum-done').textContent=da;
  document.getElementById('sum-remain').textContent=ta-da;
  document.getElementById('sum-pct').textContent=ta?Math.round(da/ta*100)+'%':'0%';
  const sl=document.getElementById('status-line');
  const rem=ta-da;
  sl.innerHTML=rem===0?'所有任务已完成 <span>✦</span>':'还有 <span>'+rem+'</span> 项待完成';
}

function toggle(id,tabId){
  if(state[id]){state[id]=null;}
  else{
    const ds=fmtDate(new Date());state[id]=ds;
    let name='';appData[tabId].sections.forEach(s=>s.tasks.forEach(t=>{if(t.id===id)name=t.name;}));
    history.unshift({date:ds,name,tab:tabId,ts:Date.now()});
    if(history.length>500)history.length=500;
  }
  save();render();
}

function delTask(tabId,secLabel,id,e){
  e.stopPropagation();
  const s=appData[tabId].sections.find(s=>s.label===secLabel);
  if(s)s.tasks=s.tasks.filter(t=>t.id!==id);
  delete state[id];save();render();
}

let openAddSec=null;
function showInlineAdd(tabId,secLabel){
  openAddSec={tabId,secLabel};render();
  setTimeout(()=>{const i=document.getElementById('inline-inp');if(i)i.focus();},60);
}
function inlineConfirm(){
  const inp=document.getElementById('inline-inp');if(!inp)return;
  const name=inp.value.trim();
  if(!name){openAddSec=null;render();return;}
  const {tabId,secLabel}=openAddSec;
  const s=appData[tabId].sections.find(s=>s.label===secLabel);
  if(s)s.tasks.push({id:'c'+Date.now(),name});
  openAddSec=null;save();render();
}
function inlineCancel(){openAddSec=null;render();}

let currentTab='daily';

function renderTaskTab(tabId){
  const container=document.getElementById('tab-'+tabId);
  const tab=appData[tabId];
  let html='';
  tab.sections.forEach(sec=>{
    const isOpen=openAddSec&&openAddSec.tabId===tabId&&openAddSec.secLabel===sec.label;
    if(!sec.tasks.length&&!isOpen)return;
    html+=`<div class="section">
      <div class="sec-header">
        <span class="sec-name">${sec.label}</span>
        <span class="sec-line"></span>
        <button class="sec-add" onclick="showInlineAdd('${tabId}','${sec.label}')">+ 添加</button>
      </div>
      <div class="task-list">`;
    sec.tasks.forEach(task=>{
      const done=!!state[task.id];
      let tags='';
      if(task.warn) tags+=`<span class="tag tag-warn">重点</span>`;
      if(task.bi)   tags+=`<span class="tag tag-bi">隔周</span>`;
      if(task.plant)tags+=`<span class="tag tag-plant">植物</span>`;
      const dateStr=done?`<span class="t-date">${state[task.id]} 完成</span>`:'';
      html+=`<div class="task-card ${done?'done':''}" onclick="toggle('${task.id}','${tabId}')">
        <div class="t-check"><div class="t-tick"></div></div>
        <div class="t-body">
          <span class="t-name">${task.name}</span>
          <div class="t-tags">${tags}</div>
          ${dateStr}
        </div>
        <button class="t-del" onclick="delTask('${tabId}','${sec.label}','${task.id}',event)">×</button>
      </div>`;
    });
    html+='</div>';
    if(isOpen){
      html+=`<div class="inline-add-row">
        <input class="inline-input" id="inline-inp" placeholder="任务名称，回车确认"
          onkeydown="if(event.key==='Enter')inlineConfirm();if(event.key==='Escape')inlineCancel();">
        <button class="inline-ok" onclick="inlineConfirm()">确认</button>
        <button class="inline-cancel" onclick="inlineCancel()">取消</button>
      </div>`;
    }
    html+='</div>';
  });
  container.innerHTML=html;
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!history.length){el.innerHTML=`<div class="empty-hist">还没有完成记录<br>打勾任务后会在这里显示</div>`;return;}
  const groups={};
  history.slice(0,300).forEach(h=>{
    const k=h.archivedAt?h.archivedAt+'（自动归档）':h.date;
    if(!groups[k])groups[k]=[];groups[k].push(h);
  });
  let html='';
  Object.keys(groups).forEach(k=>{
    html+=`<div class="hist-group"><div class="hist-group-label">${k}</div>`;
    groups[k].forEach(h=>{html+=`<div class="hist-row"><span class="hist-date">${h.date}</span><span class="hist-name">${h.name}</span><span class="hist-tab">${TNAMES[h.tab]||''}</span></div>`;});
    html+='</div>';
  });
  el.innerHTML=html;
}

function render(){
  if(currentTab==='history')renderHistory();
  else renderTaskTab(currentTab);
  updateLeft();
}

function switchTab(tabId){
  openAddSec=null;currentTab=tabId;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',['daily','weekly','monthly','history'][i]===tabId);});
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tabId).classList.add('active');
  const show=tabId!=='history';
  document.getElementById('reset-btn').style.display=show?'':'none';
  document.getElementById('add-btn').style.display=show?'':'none';
  render();
}

function resetCurrent(){
  if(currentTab==='history')return;
  archiveReset(currentTab,TNAMES[currentTab]);save();render();
}

function openGlobalModal(){
  document.getElementById('g-name').value='';document.getElementById('g-sec').value='';
  document.getElementById('g-tag').value='';
  document.getElementById('g-tab').value=currentTab==='history'?'weekly':currentTab;
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('g-name').focus(),80);
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function globalAdd(){
  const name=document.getElementById('g-name').value.trim();if(!name)return;
  const tabId=document.getElementById('g-tab').value;
  const secLabel=document.getElementById('g-sec').value.trim()||'自定义';
  const tag=document.getElementById('g-tag').value;
  const task={id:'c'+Date.now(),name};
  if(tag==='warn')task.warn=true;if(tag==='bi')task.bi=true;if(tag==='plant')task.plant=true;
  let sec=appData[tabId].sections.find(s=>s.label===secLabel);
  if(!sec){sec={label:secLabel,tasks:[]};appData[tabId].sections.push(sec);}
  sec.tasks.push(task);save();closeModal();
  if(currentTab!==tabId)switchTab(tabId);else render();
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('g-name').addEventListener('keydown',e=>{if(e.key==='Enter')globalAdd();if(e.key==='Escape')closeModal();});

load();checkReset();updateClock();render();
setInterval(()=>{updateClock();checkReset();render();},60000);
</script>
</body>
</html>
